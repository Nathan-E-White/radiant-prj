<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">Fleet Ops Overseer Board Concept</title>
  <desc id="desc">Original public-safe concept schematic showing a reactor cutaway, twin projection core, service trains, fleet units, and measured, imputed, and simulated data paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172327" />
      <stop offset="0.48" stop-color="#182a2d" />
      <stop offset="1" stop-color="#11191c" />
    </linearGradient>
    <linearGradient id="core-hot" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9a58ff" />
      <stop offset="0.52" stop-color="#23d6d2" />
      <stop offset="1" stop-color="#1c4a68" />
    </linearGradient>
    <linearGradient id="service-fill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#31edf0" stop-opacity="0.95" />
      <stop offset="1" stop-color="#0aaebd" stop-opacity="0.66" />
    </linearGradient>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#18e889" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2be7e9" />
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: rgba(120, 190, 174, 0.08); stroke-width: 1; }
      .pipe { fill: none; stroke: #18e889; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .pipe-soft { fill: none; stroke: rgba(24, 232, 137, 0.5); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .signal { fill: none; stroke: #2be7e9; stroke-width: 2; stroke-dasharray: 7 8; stroke-linecap: round; marker-end: url(#arrow-cyan); }
      .sim { fill: none; stroke: #f3ad4f; stroke-width: 2; stroke-dasharray: 5 7; stroke-linecap: round; }
      .imputed { fill: none; stroke: #8a6bff; stroke-width: 2; stroke-dasharray: 2 8; stroke-linecap: round; }
      .outline { fill: rgba(11, 24, 27, 0.58); stroke: rgba(33, 232, 144, 0.62); stroke-width: 2; }
      .cyan-outline { fill: rgba(10, 32, 36, 0.76); stroke: rgba(43, 231, 233, 0.72); stroke-width: 2; }
      .purple-outline { fill: rgba(31, 22, 44, 0.76); stroke: rgba(176, 108, 255, 0.72); stroke-width: 2; }
      .gold-outline { fill: rgba(45, 35, 19, 0.72); stroke: rgba(243, 173, 79, 0.72); stroke-width: 2; }
      .label { fill: #d8efe7; font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .tiny { fill: #a8c4bb; font: 700 10px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .micro { fill: #7fb4a4; font: 700 8px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .title { fill: #f4fff9; font: 800 18px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .badge-text { fill: #bdf8d8; font: 800 9px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .badge { fill: rgba(12, 35, 32, 0.88); stroke: rgba(33, 232, 144, 0.64); stroke-width: 1.4; }
      .badge-warn { fill: rgba(54, 38, 19, 0.86); stroke: rgba(243, 173, 79, 0.78); stroke-width: 1.4; }
      .white-ring { fill: none; stroke: #e4eaf0; stroke-width: 16; }
      .core-shell { fill: rgba(88, 63, 147, 0.42); stroke: #d956ff; stroke-width: 7; }
      .core-sector { fill: url(#core-hot); stroke: rgba(240, 248, 255, 0.22); stroke-width: 1; }
      .center-mass { fill: #6b6763; stroke: rgba(255, 255, 255, 0.18); stroke-width: 2; }
      .service { fill: url(#service-fill); stroke: #78f4ff; stroke-width: 3; }
      .fan { fill: none; stroke: #cfece4; stroke-width: 3; stroke-linecap: round; }
      .valve { fill: #163236; stroke: #18e889; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="540" rx="0" />
  <g opacity="0.9">
    <path class="grid" d="M0 60H1280 M0 120H1280 M0 180H1280 M0 240H1280 M0 300H1280 M0 360H1280 M0 420H1280 M0 480H1280" />
    <path class="grid" d="M80 0V540 M160 0V540 M240 0V540 M320 0V540 M400 0V540 M480 0V540 M560 0V540 M640 0V540 M720 0V540 M800 0V540 M880 0V540 M960 0V540 M1040 0V540 M1120 0V540 M1200 0V540" />
  </g>

  <text x="520" y="38" class="title">KALEIDOS FLEET TWIN OVERSEER BOARD - CONCEPT</text>
  <text x="520" y="58" class="tiny">measured telemetry | imputed twin state | simulated scenario pressure | service-flow display</text>

  <!-- Left reactor cutaway -->
  <g transform="translate(190 272)">
    <circle r="156" class="white-ring" />
    <circle r="132" class="core-shell" />
    <circle r="76" class="center-mass" />
    <g id="core-sectors">
      <g transform="rotate(0)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K01</text></g>
      <g transform="rotate(22.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K02</text></g>
      <g transform="rotate(45)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K03</text></g>
      <g transform="rotate(67.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K04</text></g>
      <g transform="rotate(90)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K05</text></g>
      <g transform="rotate(112.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K06</text></g>
      <g transform="rotate(135)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K07</text></g>
      <g transform="rotate(157.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K08</text></g>
      <g transform="rotate(180)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K09</text></g>
      <g transform="rotate(202.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K10</text></g>
      <g transform="rotate(225)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K11</text></g>
      <g transform="rotate(247.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K12</text></g>
      <g transform="rotate(270)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K13</text></g>
      <g transform="rotate(292.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K14</text></g>
      <g transform="rotate(315)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K15</text></g>
      <g transform="rotate(337.5)"><rect x="82" y="-18" width="38" height="36" rx="14" class="core-sector" /><text x="91" y="4" class="micro">K16</text></g>
    </g>
    <text x="-63" y="-120" class="label">UNIT CUTAWAY</text>
    <text x="-46" y="120" class="tiny">shared reactor plate</text>
  </g>

  <!-- Center conversion train -->
  <path class="pipe" d="M340 264H394V238H452" />
  <path class="pipe-soft" d="M342 288H402V315H500" />
  <g transform="translate(452 221)">
    <rect x="0" y="0" width="112" height="54" rx="8" class="purple-outline" />
    <path d="M13 16H88" stroke="#18e889" stroke-width="5" />
    <path d="M13 28H88" stroke="#18e889" stroke-width="5" />
    <path d="M13 40H88" stroke="#18e889" stroke-width="5" />
    <rect x="88" y="6" width="18" height="42" rx="4" fill="#b766ff" />
    <text x="15" y="-10" class="tiny">primary heat train</text>
  </g>
  <g transform="translate(585 246)">
    <path d="M0 40L30 0L60 40Z" fill="#d7a0ff" stroke="#d7a0ff" stroke-width="2" />
    <line x1="30" y1="40" x2="30" y2="74" stroke="#d7a0ff" stroke-width="9" stroke-linecap="round" />
    <circle cx="102" cy="39" r="24" class="outline" />
    <text x="93" y="44" class="label">M</text>
    <path class="pipe-soft" d="M60 40H78" />
    <text x="-6" y="92" class="tiny">conversion island</text>
  </g>

  <!-- Digital twin core -->
  <g transform="translate(512 92)">
    <rect x="0" y="0" width="212" height="92" rx="10" class="cyan-outline" />
    <text x="18" y="27" class="label">TWIN PROJECTOR</text>
    <text x="18" y="48" class="tiny">lineage + confidence + freshness</text>
    <rect x="18" y="62" width="54" height="18" rx="9" class="badge" />
    <text x="29" y="75" class="badge-text">measured</text>
    <rect x="82" y="62" width="54" height="18" rx="9" class="badge-warn" />
    <text x="98" y="75" class="badge-text" fill="#ffe3a4">sim</text>
    <rect x="146" y="62" width="48" height="18" rx="9" class="purple-outline" />
    <text x="155" y="75" class="badge-text">impute</text>
  </g>
  <path class="signal" d="M452 184C480 134 500 124 512 124" />
  <path class="sim" d="M692 214C680 185 676 170 674 184" />
  <path class="imputed" d="M619 184V235" />

  <!-- Top telemetry bus -->
  <path class="pipe" d="M520 76H1176V45" />
  <path class="pipe-soft" d="M520 76V114" />
  <g transform="translate(402 32)">
    <rect x="0" y="0" width="60" height="24" rx="12" class="badge" />
    <text x="12" y="16" class="badge-text">KAL-01</text>
    <rect x="0" y="36" width="60" height="24" rx="12" class="badge" />
    <text x="12" y="52" class="badge-text">KAL-03</text>
  </g>
  <g transform="translate(484 54)">
    <rect x="0" y="0" width="70" height="24" rx="12" class="badge-warn" />
    <text x="12" y="16" class="badge-text" fill="#ffe3a4">late 4m</text>
  </g>
  <g transform="translate(750 46)">
    <rect x="0" y="0" width="78" height="24" rx="12" class="badge" />
    <text x="12" y="16" class="badge-text">RUN-A13</text>
  </g>

  <!-- Right service trains -->
  <g transform="translate(802 112)">
    <rect x="0" y="0" width="386" height="326" rx="12" class="outline" />
    <text x="18" y="30" class="label">SERVICE FLOW BOARD</text>
    <text x="18" y="50" class="tiny">electric | facility heat | desalination | backup</text>
    <path class="pipe" d="M-70 172H20V94H74" />
    <path class="pipe" d="M20 172V204H74" />
    <path class="pipe" d="M20 172V270H290" />

    <g transform="translate(82 48)">
      <rect x="0" y="0" width="36" height="146" rx="8" class="service" />
      <path d="M-22 27C-8 42 4 40 14 27" class="fan" />
      <path d="M-20 92C-5 78 6 79 18 92" class="fan" />
      <rect x="-42" y="58" width="52" height="22" rx="11" class="badge-warn" />
      <text x="-33" y="73" class="badge-text" fill="#ffe3a4">0.94 MWe</text>
      <text x="-8" y="169" class="tiny">electric</text>
    </g>

    <g transform="translate(188 48)">
      <rect x="0" y="0" width="36" height="146" rx="8" class="service" />
      <path d="M-20 42C-8 28 4 28 17 42" class="fan" />
      <path d="M-22 104C-8 119 4 118 16 104" class="fan" />
      <rect x="-47" y="58" width="58" height="22" rx="11" class="badge" />
      <text x="-37" y="73" class="badge-text">2.6 MWt</text>
      <text x="-15" y="169" class="tiny">process heat</text>
    </g>

    <g transform="translate(294 48)">
      <rect x="0" y="0" width="36" height="146" rx="8" class="service" />
      <path d="M-22 28C-8 44 4 42 14 28" class="fan" />
      <path d="M-23 104C-8 89 4 90 18 104" class="fan" />
      <rect x="-48" y="58" width="62" height="22" rx="11" class="badge" />
      <text x="-38" y="73" class="badge-text">desal</text>
      <text x="-16" y="169" class="tiny">water loop</text>
    </g>

    <g transform="translate(287 244)">
      <rect x="0" y="24" width="22" height="50" rx="10" class="service" />
      <rect x="28" y="10" width="22" height="64" rx="10" class="service" />
      <rect x="56" y="30" width="22" height="44" rx="10" class="service" />
      <text x="-5" y="94" class="tiny">resilience bank</text>
    </g>

    <g transform="translate(92 242)">
      <rect x="0" y="0" width="78" height="28" rx="14" class="badge" />
      <text x="11" y="18" class="badge-text">fresh</text>
      <rect x="0" y="42" width="96" height="28" rx="14" class="badge-warn" />
      <text x="11" y="60" class="badge-text" fill="#ffe3a4">review flag</text>
    </g>
  </g>

  <!-- Lower loop and event deck -->
  <path class="pipe-soft" d="M454 356H520V470H1140V438" />
  <path class="signal" d="M724 136C770 120 790 132 814 158" />
  <path class="sim" d="M655 340C725 384 796 386 894 316" />

  <g transform="translate(472 382)">
    <rect x="0" y="0" width="254" height="82" rx="10" class="gold-outline" />
    <text x="18" y="28" class="label">EVENT DECK</text>
    <text x="18" y="49" class="tiny">heat spike | stale source | worker slowdown</text>
    <rect x="164" y="18" width="70" height="26" rx="13" class="badge-warn" />
    <text x="176" y="35" class="badge-text" fill="#ffe3a4">T+30</text>
  </g>

  <g transform="translate(738 382)">
    <rect x="0" y="0" width="206" height="82" rx="10" class="cyan-outline" />
    <text x="18" y="28" class="label">REACT TRUTH RAIL</text>
    <text x="18" y="49" class="tiny">selected value + lineage detail</text>
    <text x="18" y="68" class="micro">VALUE BASIS PRESERVED</text>
  </g>

  <!-- Valves / sensors -->
  <g>
    <path class="valve" d="M505 237l14 12l-14 12l-14-12z" />
    <path class="valve" d="M770 256l14 12l-14 12l-14-12z" />
    <path class="valve" d="M1166 351l14 12l-14 12l-14-12z" />
    <circle cx="396" cy="168" r="8" class="cyan-outline" />
    <circle cx="682" cy="318" r="8" class="gold-outline" />
    <circle cx="1000" cy="312" r="8" class="cyan-outline" />
  </g>

  <!-- Legend -->
  <g transform="translate(42 468)">
    <rect x="0" y="0" width="330" height="44" rx="10" class="outline" />
    <path class="signal" d="M18 14H78" />
    <text x="88" y="18" class="tiny">measured telemetry</text>
    <path class="imputed" d="M18 31H78" />
    <text x="88" y="35" class="tiny">imputed twin state</text>
    <path class="sim" d="M210 22H270" />
    <text x="278" y="26" class="tiny">simulated result</text>
  </g>
</svg>
