<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Panel 4 Fabric Topology and MPI Profiler Mockup</title>
  <desc id="desc">Fabric topology and MPI profiler with InfiniBand port error counters, message size distribution, non-blocking communication overhead, and node-link network map colored by utilization and temperature.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#172129"/>
      <stop offset="100%" stop-color="#193c42"/>
    </linearGradient>
    <style>
      text { font-family: Inter, Arial, sans-serif; }
      .title { fill: #f5fbfb; font-size: 22px; font-weight: 800; }
      .sub { fill: #c9dcde; font-size: 13px; }
      .label { fill: #506469; font-size: 13px; }
      .h2 { fill: #18272a; font-size: 15px; font-weight: 800; }
      .metric { fill: #142225; font-size: 30px; font-weight: 800; }
    </style>
  </defs>
  <rect width="1120" height="700" fill="#f3f6f6"/>
  <rect x="28" y="24" width="1064" height="652" rx="8" fill="#ffffff" stroke="#1c3033" stroke-width="2"/>
  <rect x="28" y="24" width="1064" height="82" rx="8" fill="url(#header)"/>
  <text x="56" y="58" class="title">Panel 4: Fabric Topology and MPI Profiler</text>
  <text x="56" y="84" class="sub">InfiniBand counters, message-size distribution, non-blocking communication overhead, link utilization map</text>
  <rect x="826" y="48" width="214" height="30" rx="15" fill="#e5f2ff" stroke="#8fb8e3"/>
  <text x="860" y="68" fill="#23527f" font-size="12" font-weight="800">FABRIC SAMPLE 2 Hz</text>

  <rect x="56" y="132" width="230" height="104" rx="8" fill="#edf6f1" stroke="#bad0c4"/>
  <text x="78" y="158" class="label" font-weight="800">Port errors</text>
  <text x="78" y="196" class="metric">3</text>
  <text x="78" y="220" class="label">IB port counter deltas</text>
  <rect x="314" y="132" width="230" height="104" rx="8" fill="#fff8e8" stroke="#d8bd82"/>
  <text x="336" y="158" class="label" font-weight="800">P95 link utilization</text>
  <text x="336" y="196" class="metric">84%</text>
  <text x="336" y="220" class="label">synthetic fabric warning</text>
  <rect x="572" y="132" width="230" height="104" rx="8" fill="#f3f6fb" stroke="#bdc9dc"/>
  <text x="594" y="158" class="label" font-weight="800">Non-blocking overhead</text>
  <text x="594" y="196" class="metric">7.8%</text>
  <text x="594" y="220" class="label">MPI_Isend/Irecv proxy</text>
  <rect x="830" y="132" width="210" height="104" rx="8" fill="#f8eeee" stroke="#d6aaa3"/>
  <text x="852" y="158" class="label" font-weight="800">Hot link temp</text>
  <text x="852" y="196" class="metric">68 C</text>
  <text x="852" y="220" class="label">color-coded topology</text>

  <rect x="56" y="270" width="570" height="344" rx="8" fill="#fbfcfc" stroke="#c7d3d4"/>
  <text x="80" y="302" class="h2">Interactive node-link topology map mock</text>
  <text x="80" y="328" class="label">Link color encodes utilization / fabric temperature. Node size encodes MPI rank concentration.</text>
  <g stroke-width="5" fill="none">
    <line x1="190" y1="446" x2="330" y2="356" stroke="#2f7b64"/>
    <line x1="190" y1="446" x2="330" y2="536" stroke="#d7a437"/>
    <line x1="330" y1="356" x2="486" y2="400" stroke="#c75b3c"/>
    <line x1="330" y1="536" x2="486" y2="492" stroke="#526f94"/>
    <line x1="330" y1="356" x2="330" y2="536" stroke="#8fa2ad" stroke-dasharray="8 6"/>
    <line x1="486" y1="400" x2="486" y2="492" stroke="#c75b3c"/>
  </g>
  <circle cx="190" cy="446" r="42" fill="#20373f"/>
  <text x="160" y="451" fill="#ffffff" font-size="13" font-weight="800">SW-01</text>
  <circle cx="330" cy="356" r="34" fill="#2f7b64"/>
  <text x="306" y="360" fill="#ffffff" font-size="12" font-weight="800">N-12</text>
  <circle cx="330" cy="536" r="48" fill="#d7a437"/>
  <text x="306" y="540" fill="#241b08" font-size="12" font-weight="800">N-17</text>
  <circle cx="486" cy="400" r="52" fill="#c75b3c"/>
  <text x="462" y="404" fill="#ffffff" font-size="12" font-weight="800">N-22</text>
  <circle cx="486" cy="492" r="36" fill="#526f94"/>
  <text x="462" y="496" fill="#ffffff" font-size="12" font-weight="800">N-25</text>
  <rect x="80" y="562" width="18" height="12" fill="#2f7b64"/><text x="106" y="572" class="label">nominal</text>
  <rect x="190" y="562" width="18" height="12" fill="#d7a437"/><text x="216" y="572" class="label">warn</text>
  <rect x="286" y="562" width="18" height="12" fill="#c75b3c"/><text x="312" y="572" class="label">hot</text>

  <rect x="658" y="270" width="382" height="344" rx="8" fill="#fbfcfc" stroke="#c7d3d4"/>
  <text x="682" y="302" class="h2">MPI profiler sidecar</text>
  <text x="682" y="334" class="label">Message size distribution</text>
  <line x1="706" y1="504" x2="1000" y2="504" stroke="#c7d3d4"/>
  <line x1="706" y1="376" x2="706" y2="504" stroke="#c7d3d4"/>
  <rect x="730" y="456" width="24" height="48" fill="#2f7b64"/>
  <rect x="770" y="430" width="24" height="74" fill="#2f7b64"/>
  <rect x="810" y="400" width="24" height="104" fill="#d7a437"/>
  <rect x="850" y="382" width="24" height="122" fill="#d7a437"/>
  <rect x="890" y="420" width="24" height="84" fill="#526f94"/>
  <rect x="930" y="448" width="24" height="56" fill="#526f94"/>
  <text x="724" y="530" class="label">1K</text>
  <text x="806" y="530" class="label">64K</text>
  <text x="888" y="530" class="label">1M</text>
  <text x="682" y="570" fill="#5f4b2b" font-size="13">Profiler values are synthetic HPC diagnostics, not plant instrumentation.</text>
  <text x="56" y="650" fill="#5f4b2b" font-size="13">Review focus: fabric map should support Linux/HPC debugging without pretending to be a safety display.</text>
</svg>
