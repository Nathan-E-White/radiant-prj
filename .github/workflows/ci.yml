name: readiness-console-ci

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: radiant
          POSTGRES_USER: radiant
          POSTGRES_PASSWORD: radiant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radiant -d radiant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/slurm-gateway/go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Initialize core OpenTofu providers
        run: tofu -chdir=infra/terraform init -backend=false -input=false

      - name: Install dependencies
        run: bun install

      - name: Repository verification module tests
        run: bun run repository:verify:test

      - name: Capability Ledger module tests
        run: bun run capability:ledger:test

      - name: Capability reconciliation module tests
        run: bun run capability:reconcile:test

      - name: Capability removal policy tests
        run: bun run capability:removal:test

      - name: Pipeline policy tests
        run: bun run pipeline:policy:test

      - name: Verify repository claims
        run: bun run repository:verify
        env:
          SIMOPS_POSTGRES_TEST_DSN: postgres://radiant:radiant@127.0.0.1:5432/radiant?sslmode=disable

      - name: Validate capability ledger
        run: bun run capability:ledger:check

      - name: Verify pipeline policy
        run: bun run pipeline:policy:check

      - name: Gate capability removal
        run: bun run capability:removal:check -- ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Record capability reconciliation evidence
        run: bun run capability:reconcile -- HEAD > capability-reconciliation-evidence.json

      - name: Upload capability reconciliation evidence
        uses: actions/upload-artifact@v4
        with:
          name: capability-reconciliation-evidence
          path: capability-reconciliation-evidence.json

      - name: Check Fleet Board V2 simulation assets
        run: bun run fleet-board:v2-assets:check

      - name: Verify Docker packaging budgets
        run: bun run docker:packaging:verify
        env:
          DOCKER_CONTEXT: default
          DOCKER_PACKAGING_PLATFORM: linux/amd64
          DOCKER_PACKAGING_REGISTRY_REUSE: "true"
          DOCKER_PACKAGING_REGISTRY_PUBLISH: "false"
          DOCKER_BAKE_CACHE_FROM_CONSOLE: type=gha,scope=radiant-console-main
          DOCKER_BAKE_CACHE_FROM_MOCK_WORKER: type=gha,scope=radiant-mock-worker-main
          DOCKER_BAKE_CACHE_FROM_REACTOR_TELEMETRY_WORKER: type=gha,scope=radiant-reactor-telemetry-worker-main
          DOCKER_BAKE_CACHE_FROM_SIMOPS_GENERATOR: type=gha,scope=radiant-simops-generator-main
          DOCKER_BAKE_CACHE_FROM_GO_RUNTIME: type=gha,scope=radiant-go-runtime-main
          DOCKER_BAKE_CACHE_TO_CONSOLE: ${{ github.ref == 'refs/heads/main' && 'type=gha,scope=radiant-console-main,mode=max,ignore-error=true' || '' }}
          DOCKER_BAKE_CACHE_TO_MOCK_WORKER: ${{ github.ref == 'refs/heads/main' && 'type=gha,scope=radiant-mock-worker-main,mode=max,ignore-error=true' || '' }}
          DOCKER_BAKE_CACHE_TO_REACTOR_TELEMETRY_WORKER: ${{ github.ref == 'refs/heads/main' && 'type=gha,scope=radiant-reactor-telemetry-worker-main,mode=max,ignore-error=true' || '' }}
          DOCKER_BAKE_CACHE_TO_SIMOPS_GENERATOR: ${{ github.ref == 'refs/heads/main' && 'type=gha,scope=radiant-simops-generator-main,mode=max,ignore-error=true' || '' }}
          DOCKER_BAKE_CACHE_TO_GO_RUNTIME: ${{ github.ref == 'refs/heads/main' && 'type=gha,scope=radiant-go-runtime-main,mode=max,ignore-error=true' || '' }}

      - name: Upload Docker packaging evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-packaging-evidence
          path: .local/docker-packaging-evidence/

      - name: Backend gateway tests
        run: bun run backend:test
        env:
          REACTOR_TELEMETRY_TEST_IMAGE: radiant-scada-standins:ci

      - name: Backend dataplane and Iceberg tests
        run: bun run backend:dataplane:test

      - name: Postgres coherent Snapshot tests
        run: bun run backend:snapshot:postgres:test
        env:
          SIMOPS_POSTGRES_TEST_DSN: postgres://radiant:radiant@127.0.0.1:5432/radiant?sslmode=disable

      - name: Validate fixtures
        run: bun run validate:fixtures

      - name: Generate objective evidence index
        run: bun run evidence:generate

      - name: Check quality documentation package
        run: bun run quality:check

      - name: Check ADR style
        run: bun run adr:check

      - name: Check Docker prune hygiene helper
        run: bun run docker:prune:check

      - name: Check Docker storage policy
        run: bun run docker:storage:check

      - name: Check guarded hygiene cleanup helper
        run: bun run hygiene:clean:check
