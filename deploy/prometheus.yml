global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "slurm-gateway"
    static_configs:
      - targets: ["slurm-gateway:8080"]
  - job_name: "simops-moq-gateway"
    static_configs:
      - targets: ["simops-moq-gateway:9443"]
  - job_name: "simops-timescale-writer"
    static_configs:
      - targets: ["simops-timescale-writer:9450"]
  - job_name: "simops-iceberg-writer"
    static_configs:
      - targets: ["simops-iceberg-writer:9460"]
  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]
