services:
  slurm-gateway:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
    ports:
      - "8081:8080"
    environment:
      SLURM_GATEWAY_MODE: "mock"
      SLURM_GATEWAY_ALLOWED_CLIENTS: "react-backend-client,cluster-admin"
      SLURM_GATEWAY_ALLOWED_PARTITIONS: "transport,thermal,fleet,cpu-short,cpu-long,gpu"
      SLURM_GATEWAY_ALLOWED_SCRIPTS: "transport-toy,thermal-margin,fleet-screen,module-rerun"
      SLURM_GATEWAY_SCRIPT_ROOT: "/app/.local/slurm-scripts"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos Slurm Gateway"
      org.opencontainers.image.description: "Public-safe mock-first backend handler gateway"

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - slurm-gateway
