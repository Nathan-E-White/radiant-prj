services:
  slurm-gateway:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      target: gateway-runtime
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    ports:
      - "8081:8080"
    environment:
      SLURM_GATEWAY_MODE: "mock"
      SLURM_GATEWAY_ALLOWED_CLIENTS: "react-backend-client,cluster-admin"
      SLURM_GATEWAY_ALLOWED_PARTITIONS: "transport,thermal,fleet,cpu-short,cpu-long,gpu"
      SLURM_GATEWAY_ALLOWED_SCRIPTS: "transport-toy,thermal-margin,fleet-screen,module-rerun"
      SLURM_GATEWAY_SCRIPT_ROOT: "/app/.local/slurm-scripts"
      SLURM_GATEWAY_REQUIRE_CLIENT_CERT: "false"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      SIMOPS_TIMESCALE_CONSUMER_GROUP: "simops-timescale-writer"
      SIMOPS_ICEBERG_CONSUMER_GROUP: "simops-iceberg-writer"
      SIMOPS_MOQ_CONSUMER_GROUP: "simops-moq-gateway"
      SIMOPS_LAUNCH_MODE: "auto"
      SIMOPS_WORKER_RUNTIME: "docker"
      SIMOPS_WORKER_IMAGE: "radiant-simops-generator:latest"
      SIMOPS_WORKER_INGEST_BASE_URL: "http://slurm-gateway:8080"
      SIMOPS_WORKER_NETWORK: "radiant-simops-local"
      SIMOPS_WORKER_KUBERNETES_NAMESPACE: "radiant-simops"
      SIMOPS_WORKER_FRAME_OVERRIDE: "${SIMOPS_WORKER_FRAME_OVERRIDE:-2}"
      SIMOPS_WORKER_CLEANUP_TTL: "${SIMOPS_WORKER_CLEANUP_TTL:-10m}"
      SIMOPS_WORKER_AUTO_REMOVE: "${SIMOPS_WORKER_AUTO_REMOVE:-false}"
      SIMOPS_MOQ_WEBTRANSPORT_URL: "https://127.0.0.1:9443/moq/simops"
      SIMOPS_ICEBERG_CATALOG: "postgres-sql"
      SIMOPS_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_ICEBERG_WAREHOUSE: "s3://radiant-simops/warehouse"
      SIMOPS_ICEBERG_S3_ENDPOINT: "http://minio:9000"
      SIMOPS_ICEBERG_S3_BUCKET: "radiant-simops"
      SIMOPS_ICEBERG_S3_REGION: "local"
      SIMOPS_ICEBERG_S3_ACCESS_KEY_ID: "radiant"
      SIMOPS_ICEBERG_S3_SECRET_ACCESS_KEY: "radiant-password"
      AWS_REGION: "local"
      AWS_DEFAULT_REGION: "local"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "radiant"
      AWS_SECRET_ACCESS_KEY: "radiant-password"
      AWS_EC2_METADATA_DISABLED: "true"
      SIMOPS_ICEBERG_WRITER_MODE: "manifest"
      SIMOPS_ICEBERG_BATCH_SIZE: "1"
      SIMOPS_ICEBERG_FLUSH_INTERVAL: "5s"
      SIMOPS_ICEBERG_RUST_CMD: ""
      SIMOPS_ICEBERG_MANIFEST_DIR: "/tmp/simops-iceberg-manifests"
      WORKBENCH_STORE: "postgres"
      WORKBENCH_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_EVENT_LOG: "redpanda"
      WORKBENCH_REDPANDA_BROKERS: "redpanda:9092"
      WORKBENCH_SCADA_TOPIC: "scada.telemetry.v1"
      WORKBENCH_RESULTS_TOPIC: "simops.results.v1"
      WORKBENCH_TWIN_STATE_TOPIC: "digital-twin.state.v1"
      WORKBENCH_INTERNAL_INGEST_TOKEN: "workbench-local-token"
      WORKBENCH_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_ICEBERG_WAREHOUSE: "s3://radiant-simops/warehouse"
      WORKBENCH_ICEBERG_S3_ENDPOINT: "http://minio:9000"
      WORKBENCH_ICEBERG_S3_BUCKET: "radiant-simops"
      WORKBENCH_ICEBERG_S3_REGION: "local"
      WORKBENCH_ICEBERG_S3_ACCESS_KEY_ID: "radiant"
      WORKBENCH_ICEBERG_S3_SECRET_ACCESS_KEY: "radiant-password"
      REACTOR_TELEMETRY_ENABLED: "true"
      REACTOR_TELEMETRY_CONTROL_STORE: "postgres"
      REACTOR_TELEMETRY_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      REACTOR_TELEMETRY_RUNTIME: "docker"
      REACTOR_TELEMETRY_WORKER_IMAGE: "radiant-scada-standins:latest"
      REACTOR_TELEMETRY_WORKER_NETWORK: "radiant-simops-local"
      REACTOR_TELEMETRY_INGEST_BASE_URL: "http://slurm-gateway:8080"
      REACTOR_TELEMETRY_CREDENTIAL_SIGNING_KEY: "local-demo-reactor-telemetry-key"
      REACTOR_TELEMETRY_MAX_REACTORS_PER_SESSION: "4"
      REACTOR_TELEMETRY_WORKERS_PER_SET: "3"
      REACTOR_TELEMETRY_SESSION_TTL: "24h"
      REACTOR_TELEMETRY_MEASURED_RETENTION: "24h"
      REACTOR_TELEMETRY_CLEANUP_TIMEOUT: "5m"
      REACTOR_TELEMETRY_RECONCILE_INTERVAL: "30s"
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    depends_on:
      - postgres
      - redpanda
      - minio
    labels:
      org.opencontainers.image.title: "Kaleidos Slurm Gateway"
      org.opencontainers.image.description: "Public-safe mock-first backend handler gateway"

  simops-moq-gateway:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/simops-stream-gateway"]
    ports:
      - "9443:9443/tcp"
      - "9443:9443/udp"
    environment:
      SIMOPS_STREAM_GATEWAY_ADDR: ":9443"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      SIMOPS_TIMESCALE_CONSUMER_GROUP: "simops-timescale-writer"
      SIMOPS_ICEBERG_CONSUMER_GROUP: "simops-iceberg-writer"
      SIMOPS_MOQ_CONSUMER_GROUP: "simops-moq-gateway"
      SIMOPS_MOQ_WEBTRANSPORT_URL: "https://127.0.0.1:9443/moq/simops"
      SIMOPS_STREAM_GATEWAY_TLS_CERT_FILE: "/run/secrets/simops_moq_gateway_server_crt"
      SIMOPS_STREAM_GATEWAY_TLS_KEY_FILE: "/run/secrets/simops_moq_gateway_server_key"
      SIMOPS_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_ICEBERG_S3_REGION: "local"
    secrets:
      - simops_moq_gateway_ca_crt
      - simops_moq_gateway_server_crt
      - simops_moq_gateway_server_key
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9443/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - redpanda
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps MoQ Gateway"
      org.opencontainers.image.description: "Redpanda-backed WebTransport telemetry track gateway"

  simops-timescale-writer:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/simops-timescale-writer"]
    ports:
      - "9450:9450"
    environment:
      SIMOPS_TIMESCALE_WRITER_ADDR: ":9450"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      SIMOPS_TIMESCALE_CONSUMER_GROUP: "simops-timescale-writer"
      SIMOPS_ICEBERG_CONSUMER_GROUP: "simops-iceberg-writer"
      SIMOPS_MOQ_CONSUMER_GROUP: "simops-moq-gateway"
      SIMOPS_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_ICEBERG_S3_REGION: "local"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9450/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - postgres
      - redpanda
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps Timescale Writer"
      org.opencontainers.image.description: "Redpanda consumer projecting telemetry frames into Timescale hypertables"

  simops-iceberg-writer:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/simops-iceberg-writer"]
    ports:
      - "9460:9460"
    environment:
      SIMOPS_ICEBERG_WRITER_ADDR: ":9460"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      SIMOPS_TIMESCALE_CONSUMER_GROUP: "simops-timescale-writer"
      SIMOPS_ICEBERG_CONSUMER_GROUP: "simops-iceberg-writer"
      SIMOPS_MOQ_CONSUMER_GROUP: "simops-moq-gateway"
      SIMOPS_ICEBERG_CATALOG: "postgres-sql"
      SIMOPS_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_ICEBERG_WAREHOUSE: "s3://radiant-simops/warehouse"
      SIMOPS_ICEBERG_S3_ENDPOINT: "http://minio:9000"
      SIMOPS_ICEBERG_S3_BUCKET: "radiant-simops"
      SIMOPS_ICEBERG_S3_REGION: "local"
      SIMOPS_ICEBERG_S3_ACCESS_KEY_ID: "radiant"
      SIMOPS_ICEBERG_S3_SECRET_ACCESS_KEY: "radiant-password"
      AWS_REGION: "local"
      AWS_DEFAULT_REGION: "local"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "radiant"
      AWS_SECRET_ACCESS_KEY: "radiant-password"
      AWS_EC2_METADATA_DISABLED: "true"
      SIMOPS_ICEBERG_WRITER_MODE: "iceberg-go"
      SIMOPS_ICEBERG_BATCH_SIZE: "1"
      SIMOPS_ICEBERG_FLUSH_INTERVAL: "5s"
      SIMOPS_ICEBERG_RUST_CMD: ""
      SIMOPS_ICEBERG_MANIFEST_DIR: "/tmp/simops-iceberg-manifests"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9460/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - postgres
      - redpanda
      - minio
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps Iceberg Writer"
      org.opencontainers.image.description: "Iceberg Rust telemetry artifact writer boundary"

  workbench-projection-writer:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/workbench-projection-writer"]
    ports:
      - "9470:9470"
    environment:
      WORKBENCH_PROJECTION_WRITER_ADDR: ":9470"
      SIMOPS_ENABLED: "false"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      WORKBENCH_STORE: "postgres"
      WORKBENCH_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_EVENT_LOG: "redpanda"
      WORKBENCH_REDPANDA_BROKERS: "redpanda:9092"
      WORKBENCH_SCADA_TOPIC: "scada.telemetry.v1"
      WORKBENCH_RESULTS_TOPIC: "simops.results.v1"
      WORKBENCH_TWIN_STATE_TOPIC: "digital-twin.state.v1"
      WORKBENCH_INTERNAL_INGEST_TOKEN: "workbench-local-token"
      WORKBENCH_SCADA_PROJECTION_CONSUMER_GROUP: "workbench-scada-projection-writer"
      WORKBENCH_RESULT_PROJECTION_CONSUMER_GROUP: "workbench-result-projection-writer"
      WORKBENCH_TWIN_PROJECTION_CONSUMER_GROUP: "workbench-twin-projection-writer"
      WORKBENCH_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_ICEBERG_S3_REGION: "local"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9470/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - postgres
      - redpanda
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos Workbench Projection Writer"
      org.opencontainers.image.description: "Workbench Redpanda consumer projecting measured, simulated, and twin-state frames into Postgres"

  twin-projector:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/twin-projector"]
    ports:
      - "9480:9480"
    environment:
      TWIN_PROJECTOR_ADDR: ":9480"
      SIMOPS_ENABLED: "false"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      WORKBENCH_STORE: "postgres"
      WORKBENCH_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_EVENT_LOG: "redpanda"
      WORKBENCH_REDPANDA_BROKERS: "redpanda:9092"
      WORKBENCH_SCADA_TOPIC: "scada.telemetry.v1"
      WORKBENCH_RESULTS_TOPIC: "simops.results.v1"
      WORKBENCH_TWIN_STATE_TOPIC: "digital-twin.state.v1"
      WORKBENCH_INTERNAL_INGEST_TOKEN: "workbench-local-token"
      WORKBENCH_TWIN_PROJECTOR_SCADA_GROUP: "workbench-twin-projector-scada"
      WORKBENCH_TWIN_PROJECTOR_RESULT_GROUP: "workbench-twin-projector-results"
      WORKBENCH_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_ICEBERG_S3_REGION: "local"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9480/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - postgres
      - redpanda
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos Twin Projector"
      org.opencontainers.image.description: "Projects measured and simulated backend dataflow units into imputed digital-twin state"

  workbench-iceberg-writer:
    build:
      context: ..
      dockerfile: deploy/slurm-gateway.Dockerfile
      args:
        SIMOPS_GO_BUILDER_IMAGE: "${SIMOPS_GO_BUILDER_IMAGE:-golang:1.26-alpine}"
        SIMOPS_GATEWAY_RUNTIME_IMAGE: "${SIMOPS_GATEWAY_RUNTIME_IMAGE:-alpine:3.21}"
    command: ["/app/workbench-iceberg-writer"]
    ports:
      - "9490:9490"
    environment:
      WORKBENCH_ICEBERG_WRITER_ADDR: ":9490"
      SIMOPS_ENABLED: "false"
      SIMOPS_CONTROL_STORE: "postgres"
      SIMOPS_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      SIMOPS_TELEMETRY_LOG: "redpanda"
      SIMOPS_REDPANDA_BROKERS: "redpanda:9092"
      SIMOPS_REDPANDA_TOPIC: "simops.telemetry.v1"
      WORKBENCH_STORE: "postgres"
      WORKBENCH_POSTGRES_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_EVENT_LOG: "redpanda"
      WORKBENCH_REDPANDA_BROKERS: "redpanda:9092"
      WORKBENCH_SCADA_TOPIC: "scada.telemetry.v1"
      WORKBENCH_RESULTS_TOPIC: "simops.results.v1"
      WORKBENCH_TWIN_STATE_TOPIC: "digital-twin.state.v1"
      WORKBENCH_INTERNAL_INGEST_TOKEN: "workbench-local-token"
      WORKBENCH_ICEBERG_CONSUMER_GROUP: "workbench-iceberg-writer"
      WORKBENCH_ICEBERG_CATALOG_DSN: "postgres://radiant:radiant@postgres:5432/radiant?sslmode=disable"
      WORKBENCH_ICEBERG_WAREHOUSE: "s3://radiant-simops/warehouse"
      WORKBENCH_ICEBERG_S3_ENDPOINT: "http://minio:9000"
      WORKBENCH_ICEBERG_S3_BUCKET: "radiant-simops"
      WORKBENCH_ICEBERG_S3_REGION: "local"
      WORKBENCH_ICEBERG_S3_ACCESS_KEY_ID: "radiant"
      WORKBENCH_ICEBERG_S3_SECRET_ACCESS_KEY: "radiant-password"
      AWS_REGION: "local"
      AWS_DEFAULT_REGION: "local"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "radiant"
      AWS_SECRET_ACCESS_KEY: "radiant-password"
      AWS_EC2_METADATA_DISABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9490/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
    depends_on:
      - postgres
      - redpanda
      - minio
      - minio-init
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos Workbench Iceberg Writer"
      org.opencontainers.image.description: "Appends Workbench measured, simulated, and twin-state streams into Iceberg tables"

  redpanda:
    image: "${SIMOPS_REDPANDA_IMAGE:-docker.redpanda.com/redpandadata/redpanda:latest}"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps Redpanda"
      org.opencontainers.image.description: "Hot durable telemetry log for Simulation Ops"

  postgres:
    image: "${SIMOPS_TIMESCALE_IMAGE:-timescale/timescaledb:latest-pg17}"
    environment:
      POSTGRES_DB: "radiant"
      POSTGRES_USER: "radiant"
      POSTGRES_PASSWORD: "radiant"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps Timescale Postgres"
      org.opencontainers.image.description: "Control-plane state, Timescale telemetry projection, and Iceberg SQL catalog metadata"

  minio:
    image: "${SIMOPS_MINIO_IMAGE:-quay.io/minio/minio:latest}"
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "radiant"
      MINIO_ROOT_PASSWORD: "radiant-password"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    labels:
      org.opencontainers.image.title: "Kaleidos SimOps MinIO"
      org.opencontainers.image.description: "S3-compatible local warehouse storage for Iceberg telemetry artifacts"

  minio-init:
    image: "${SIMOPS_MINIO_MC_IMAGE:-quay.io/minio/mc:latest}"
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 radiant radiant-password && mc mb --ignore-existing local/radiant-simops"

  scada-standins:
    image: radiant-scada-standins:latest
    build:
      context: ..
      dockerfile: deploy/scada-standins.Dockerfile
      args:
        SCADA_RUST_BUILDER_IMAGE: "${SCADA_RUST_BUILDER_IMAGE:-rust:1-alpine}"
        SCADA_STANDINS_RUNTIME_IMAGE: "${SCADA_STANDINS_RUNTIME_IMAGE:-gcr.io/distroless/static-debian13:nonroot}"
    command: ["--source-id", "SRC-MIXED-STANDIN-001", "--ingest-base-url", "http://slurm-gateway:8080", "--ingest-token", "workbench-local-token", "--interval-ms", "1000"]
    restart: on-failure
    depends_on:
      - slurm-gateway
    security_opt:
      - no-new-privileges:true
    labels:
      org.opencontainers.image.title: "Kaleidos SCADA Stand-Ins"
      org.opencontainers.image.description: "Resident public-safe source declaration and measured telemetry frame emitter"

  prometheus:
    image: "${SIMOPS_PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
